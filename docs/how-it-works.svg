<svg viewBox="0 0 680 482" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img">
<title>How Clementine and agentic-spec differ from typical AI design systems</title>
<desc>Left: the usual setup where an agent reads docs and drift ships. Right: Clementine's way where the agent reads an enforceable contract and a validator blocks drift. Bottom: agentic-spec on npm, 121 components passing, benchmark 7 of 7.</desc>
<defs>
<marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="agr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="482" rx="16" fill="#ffffff"/>

<text x="175" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">the usual way</text>
<text x="505" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">the clementine way</text>
<line x1="340" y1="40" x2="340" y2="312" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 4"/>

<rect x="35" y="40" width="280" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text x="175" y="62" text-anchor="middle" font-size="15" fill="#2C2C2A">AI agent</text>
<text x="175" y="79" text-anchor="middle" font-size="12" fill="#5F5E5A">Cursor · Claude · v0</text>
<line x1="175" y1="90" x2="175" y2="114" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>
<rect x="35" y="116" width="280" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text x="175" y="146" text-anchor="middle" font-size="15" fill="#2C2C2A">reads your docs + Storybook</text>
<line x1="175" y1="166" x2="175" y2="190" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>
<rect x="35" y="192" width="280" height="50" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
<text x="175" y="214" text-anchor="middle" font-size="15" fill="#791F1F">invents tokens, skips states</text>
<text x="175" y="231" text-anchor="middle" font-size="12" fill="#A32D2D">nothing checks it</text>
<line x1="175" y1="242" x2="175" y2="266" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="35" y="268" width="280" height="44" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
<text x="175" y="295" text-anchor="middle" font-size="15" fill="#791F1F">drift ships to users</text>

<rect x="365" y="40" width="280" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text x="505" y="62" text-anchor="middle" font-size="15" fill="#2C2C2A">AI agent</text>
<text x="505" y="79" text-anchor="middle" font-size="12" fill="#5F5E5A">same tools</text>
<line x1="505" y1="90" x2="505" y2="114" stroke="#534AB7" stroke-width="1.5" marker-end="url(#ap)"/>
<rect x="365" y="116" width="280" height="50" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="505" y="138" text-anchor="middle" font-size="15" fill="#3C3489">reads the contract first</text>
<text x="505" y="155" text-anchor="middle" font-size="12" fill="#534AB7">closed token list · served via MCP</text>
<line x1="505" y1="166" x2="505" y2="190" stroke="#534AB7" stroke-width="1.5" marker-end="url(#ap)"/>
<rect x="365" y="192" width="280" height="50" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="505" y="214" text-anchor="middle" font-size="15" fill="#3C3489">validator gate</text>
<text x="505" y="231" text-anchor="middle" font-size="12" fill="#534AB7">blocks drift in CI</text>
<line x1="505" y1="242" x2="505" y2="266" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#agr)"/>
<rect x="365" y="268" width="280" height="44" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
<text x="505" y="295" text-anchor="middle" font-size="15" fill="#27500A">only valid code ships</text>

<line x1="20" y1="338" x2="660" y2="338" stroke="#D3D1C7" stroke-width="1"/>
<text x="340" y="360" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">what shipped</text>

<rect x="20" y="374" width="200" height="86" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="120" y="404" text-anchor="middle" font-size="15" fill="#3C3489">agentic-spec</text>
<text x="120" y="424" text-anchor="middle" font-size="12" fill="#534AB7">the tool — live on npm</text>
<text x="120" y="442" text-anchor="middle" font-size="12" fill="#534AB7">CLI + MCP server</text>
<rect x="240" y="374" width="200" height="86" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="340" y="404" text-anchor="middle" font-size="15" fill="#3C3489">Clementine DS</text>
<text x="340" y="424" text-anchor="middle" font-size="12" fill="#534AB7">the proof — 121 components</text>
<text x="340" y="442" text-anchor="middle" font-size="12" fill="#534AB7">all pass the contract</text>
<rect x="460" y="374" width="200" height="86" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
<text x="560" y="404" text-anchor="middle" font-size="15" fill="#27500A">benchmark</text>
<text x="560" y="424" text-anchor="middle" font-size="12" fill="#3B6D11">7/7 agent mistakes caught</text>
<text x="560" y="442" text-anchor="middle" font-size="12" fill="#3B6D11">0 false positives</text>
</svg>
