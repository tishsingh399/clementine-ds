name: Contract checks

# The independent gate. Runs on EVERY PR (no path filter) so it can be a
# required status check on main — and it accepts workflow_dispatch so the
# self-heal loop can ask it to inspect a loop branch (PRs opened by the
# workflow token don't trigger pull_request workflows on their own).
# The check reports on the exact commit; GitHub only lets auto-merge finish
# if it's green. Agents propose. This gate decides.
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Regenerates packages/tokens/src/components.generated.json (the file the
      # theme + every parity/cascade script reads) and builds primitives. Must
      # run before any gate below.
      - name: Build tokens (generates component index)
        run: pnpm --filter @clementine-ds/tokens build

      - name: agentic-spec validate (structural, pinned 0.2.0)
        run: pnpm validate:contract

      - name: Cascade direction (F2)
        run: node scripts/lint-cascade-direction.mjs

      - name: Spec honesty — strict (F4/F5)
        run: node scripts/check-spec-honesty.mjs --strict

      - name: Contract parity — strict (F16)
        run: node scripts/parity-report.mjs --strict

      - name: Doc counts in sync (F9/F10)
        run: node scripts/inject-counts.mjs --check

      - name: Spec links resolve (F13)
        run: node scripts/check-spec-links.mjs
