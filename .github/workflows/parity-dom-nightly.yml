name: DOM parity (nightly)

# The painted-DOM parity layer (scripts/parity-dom.mjs) renders every component
# in a real browser and checks each painted colour against its contract tokens.
# Too heavy for per-PR (browser + full Storybook), so it runs nightly + on demand.
on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC daily
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity-dom:
    name: Painted-DOM parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clementine-ds/tokens build
      - run: pnpm build:storybook

      - name: Install Chromium for Playwright
        run: pnpm --filter storybook exec playwright install --with-deps chromium

      - name: Serve Storybook + run DOM parity
        run: |
          pnpm --filter storybook exec http-server storybook-static -p 6006 --silent &
          pnpm --filter storybook exec wait-on -t 60000 http://localhost:6006/index.json
          STORYBOOK_URL=http://localhost:6006 node scripts/parity-dom.mjs --strict --states-strict

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-dom-report
          path: apps/observatory/parity-dom-report.json
