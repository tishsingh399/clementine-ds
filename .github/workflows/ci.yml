name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-specs:
    name: Validate agentic specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run agentic-spec validate
        run: npx -y github:tishsingh399/agentic-spec validate $(find specs -name index.md | xargs -n1 dirname)

  build:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # ui depends on @clementine-ds/tokens dist; build tokens first
      - run: pnpm --filter @clementine-ds/tokens build
      - run: pnpm --filter @clementine-ds/ui exec tsc --noEmit

  size:
    name: Bundle size budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clementine-ds/tokens build
      - run: pnpm size

  # a11y is a local check (`pnpm a11y`) rather than a CI gate. The runner
  # now serves Storybook and runs axe correctly (start-server-and-test), but
  # ~74 of 276 story checks have real violations to remediate — tracked as
  # WIP, run locally with `pnpm a11y`, not gated in CI yet.
